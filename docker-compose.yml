services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
      target: production
    container_name: dashlab-backend
    ports:
    - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DB_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: dashlab-frontend
    ports:
    - "80:80"
    environment:
      - BACKEND_HOST=backend
      - BACKEND_PORT=3001
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q0-", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s