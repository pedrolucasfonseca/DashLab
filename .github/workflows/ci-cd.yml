name: DashLab CI/CD

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_BACKEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/dashlab-backend
  ECR_FRONTEND: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/dashlab-frontend

jobs:
  build-and-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AWS Credential Configure
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR Login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend
        run: |
          docker build -t $ECR_BACKEND:${{ github.sha }} ./backend
          docker push $ECR_BACKEND:${{ github.sha }}

      - name: Build & Push Frontend
        run: |
          docker build -t $ECR_FRONTEND:${{ github.sha }} ./frontend
          docker push $ECR_FRONTEND:${{ github.sha }}

  deploy:
    name: EKS Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AWS Credential Configure
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.32.0'

      - name: Kubeconfig configure
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name dashlab-cluster

      - name: Sub images & apply
        run: |
          sed -i "s|BACKEND_IMAGE|$ECR_BACKEND:${{ github.sha }}|g" k8s/backend-deployment.yml
          sed -i "s|FRONTEND_IMAGE|$ECR_FRONTEND:${{ github.sha }}|g" k8s/frontend-deployment.yml
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/

      - name: Rollout Verify
        run: |
          kubectl rollout status deployment/backend -n dashlab
          kubectl rollout status deployment/frontend -n dashlab