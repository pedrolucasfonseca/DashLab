name: Infrastructure Setup

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AWS Credential Configure
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/dashlab-github-actions
          role-session-name: GitHubActions
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.32.0'

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name dashlab-cluster

      - name: Install AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=dashlab-cluster \
            --set serviceAccount.create=true \
            --set region=us-east-1 \
            --set vpcId=$(aws eks describe-cluster --name dashlab-cluster \
              --query "cluster.resourcesVpcConfig.vpcId" --output text)