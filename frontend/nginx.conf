server {
  listen 80;
  listen [::]:80;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
  }

  location /health {
    proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT}/health;
  }

  location /api {
    proxy_pass http://${BACKEND_HOST}:${BACKEND_PORT}/api;
  }
}